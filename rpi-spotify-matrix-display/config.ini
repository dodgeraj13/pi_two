[Spotify]
# Use backend OAuth (shared with web app) instead of local OAuth
use_backend = true

# Backend URL (optional, defaults to https://matrix-backend-lv4k.onrender.com)
# Set this to your backend URL
backend_url = https://matrix-backend-lv4k.onrender.com

# These are kept for fallback/local OAuth mode (not needed when use_backend=true)
# client_id = fedad2e4ce21417c9e731aea3ddf6394
# client_secret = e1aad6380c684650a322f0499e9d41f0
# redirect_uri = http://127.0.0.1:8080/callback

# Device whitelist - only display when these devices are active
# device_whitelist = Pi Display, Living Room Speaker

[Matrix]
hardware_mapping = adafruit-hat-pwm
brightness = 70
gpio_slowdown = 2
limit_refresh_rate_hz = 0
shutdown_delay = 999999999
pixel_mapper_config = Rotate:90

